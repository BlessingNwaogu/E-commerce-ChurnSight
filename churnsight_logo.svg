<svg width="490" height="100" viewBox="0 0 490 100" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ChurnSight logo</title>
  <desc>ChurnSight customer churn analytics logo</desc>

  <!-- Icon circle -->
  <circle cx="50" cy="50" r="45" fill="#1D9E75"/>

  <!-- Eye outline -->
  <ellipse cx="50" cy="50" rx="28" ry="17" fill="none" stroke="#E1F5EE" stroke-width="2"/>

  <!-- Pupil outer -->
  <circle cx="50" cy="50" r="10" fill="#E1F5EE"/>
  <!-- Pupil inner -->
  <circle cx="50" cy="50" r="5" fill="#0F6E56"/>

  <!-- Trend line -->
  <polyline points="22,57 33,53 44,60 56,42 67,38 78,45" fill="none" stroke="#E1F5EE" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="108" y="58" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1D9E75" letter-spacing="-0.5">Churn<tspan fill="#085041">Sight</tspan></text>

  <!-- Tagline -->
  <text x="110" y="78" font-family="Arial, sans-serif" font-size="9" font-weight="400" fill="#888780" letter-spacing="2">CUSTOMER CHURN ANALYTICS</text>
</svg>
